<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCTS</title>
</head>
<link rel="stylesheet" href="style.css">

<body>




    <div class="alphaWrap" id="alphaResult"></div>

    <!-- .... -->

    <div id="apiTwoResult">

        <h1 class="apiTwoLoading">
            Loading...
        </h1>

    </div>

    <!-- .... -->
    <div class="taskThreeWrap" id="taskThreeOutput"></div>


    <!-- .... -->
    <h2>Shop Items</h2>

    <div class="mainBox" id="showData"></div>

    <!-- ...... -->
    <h2>Products Search</h2>

    <input type="text" id="search" placeholder="Search products" onkeyup="searchProducts()" />

    <div id="product"></div>


    <!-- ..... -->
    <h2>Category Filter</h2>

    <button onclick="filterProducts('electronics')">
        electronics
    </button>

    <button onclick="filterProducts('jewelery')">
        jewelery
    </button>

    <button onclick="filterProducts(`men's clothing`)">
        men's clothing
    </button>

    <button onclick="filterProducts(`women's clothing`)">
        women's clothing
    </button>

    <div id="products"></div>



    <!-- ..... -->
    <h2>Product</h2>

    <p>Shoes</p>

    <button onclick="addToCarts()">
        Add To Cart
    </button>

    <h3 id="count">
        Cart Count: 0
    </h3>


    <!-- ..... -->
    <h2>Cart Items</h2>

    <ul id="cartList"></ul>

    <h3 id="count"></h3>



    <script src="script.js">
    </script>


</body>

</html>
